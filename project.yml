name: AudioFolderPlayer
options:
  bundleIdPrefix: com.pooq
  deploymentTarget:
    iOS: "17.0"
  groupSortPosition: top
  minimumXcodeGenVersion: 2.45.4
groups:
  - AudioFolderPlayer/App
  - AudioFolderPlayer/Models
  - AudioFolderPlayer/Views
  - AudioFolderPlayer/ViewModels
  - AudioFolderPlayer/Services
  - AudioFolderPlayer/Infrastructure/Audio
  - AudioFolderPlayer/Infrastructure/DocumentPicker
  - AudioFolderPlayer/Infrastructure/FileSystem
  - AudioFolderPlayer/Resources
  - AudioFolderPlayerTests
  - AudioFolderPlayerUITests
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  AudioFolderPlayer:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AudioFolderPlayer
        excludes:
          - "**/.gitkeep"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pooq.AudioFolderPlayer
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        TARGETED_DEVICE_FAMILY: "1,2"
  AudioFolderPlayerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AudioFolderPlayerTests
        excludes:
          - "**/.gitkeep"
    dependencies:
      - target: AudioFolderPlayer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pooq.AudioFolderPlayerTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AudioFolderPlayer.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/AudioFolderPlayer"
        BUNDLE_LOADER: "$(TEST_HOST)"
  AudioFolderPlayerUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AudioFolderPlayerUITests
    dependencies:
      - target: AudioFolderPlayer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pooq.AudioFolderPlayerUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: AudioFolderPlayer
schemes:
  AudioFolderPlayer:
    build:
      targets:
        AudioFolderPlayer: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AudioFolderPlayerTests
        - AudioFolderPlayerUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
